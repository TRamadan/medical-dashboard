<div class="dc-na" dir="ltr">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <div class="dc-na__header">
    <div class="dc-na__title-group">
      <h1 class="dc-na__title">
        <i class="pi pi-bell" aria-hidden="true"></i>
        Notifications & Alerts
      </h1>
    </div>

  </div>



  <!-- ── Notification list ──────────────────────────────────── -->
  <div class="dc-na__list" role="list" aria-label="Notifications">
    @for (n of notifications(); track n.id) {
    <p-card styleClass="dc-consult-p-card">
      <div class="dc-notif" [class.dc-notif--critical]="n.level === 'critical'"
        [class.dc-notif--warning]="n.level === 'warning'" [class.dc-notif--info]="n.level === 'info'"
        [class.dc-notif--success]="n.level === 'success'" [class.dc-notif--protocol]="n.level === 'protocol'"
        role="listitem" [style.--notif-color]="levelConfig[n.level].color" [style.--notif-bg]="levelConfig[n.level].bg"
        [style.--notif-border]="levelConfig[n.level].border">



        <!-- Icon -->
        <div class="dc-notif__icon-wrap" aria-hidden="true">
          <i class="pi" [class]="n.icon"></i>
        </div>

        <!-- Content -->
        <div class="dc-notif__content">
          <div class="dc-notif__top">
            <span class="dc-notif__title">{{ n.title }}</span>
            <div class="dc-notif__right">
              @if (n.tag) {
              <span class="dc-notif__tag">{{ n.tag }}</span>
              }
              <span class="dc-notif__time">{{ n.time }}</span>
            </div>
          </div>
          <div class="dc-notif__body">{{ n.body }}</div>

          @if (n.primaryAction || n.secondaryAction) {
          <div class="dc-notif__actions">
            @if (n.secondaryAction) {
            <p-button [label]="n.secondaryAction" size="small" severity="danger" [outlined]="true"></p-button>
            }
            @if (n.primaryAction) {
            <p-button [label]="n.primaryAction" size="small" [outlined]="true"></p-button>
            }
          </div>
          }
        </div>


      </div>
    </p-card>
    }

    @if (notifications().length === 0) {
    <div class="dc-na__empty" aria-live="polite">
      <i class="pi pi-bell-slash dc-na__empty-icon" aria-hidden="true"></i>
      <p>No notifications</p>
    </div>
    }
  </div>

</div>
