<div class="font-[Inter,sans-serif] min-h-screen" style="background: #f8fafc;">

  <!-- ===== HEADER ===== -->
  <div class="sticky top-0 z-10 bg-white border-b border-gray-200 px-4 py-3 shadow-sm">
    <div class="header-row flex flex-wrap justify-between items-center gap-3">

      <!-- Tabs -->
      <div class="tab-group">
        <button
          id="tab-weekly"
          [class.active]="activeTab === 'weekly'"
          (click)="selectTab('weekly')">
          Weekly Evaluation
        </button>
        <button
          id="tab-cumulative"
          [class.active]="activeTab === 'cumulative'"
          (click)="selectTab('cumulative')">
          Cumulative Perf.
        </button>
        <button
          id="tab-athlete"
          [class.active]="activeTab === 'athlete'"
          (click)="selectTab('athlete')">
          Athlete Voice NPS
        </button>
      </div>

      <!-- Week DatePicker (range) — visible only on weekly tab -->
      @if (activeTab === 'weekly') {
        <p-datePicker
          id="weekRangePicker"
          [(ngModel)]="weekDates"
          selectionMode="range"
          [readonlyInput]="true"
          [showIcon]="true"
          dateFormat="d M yy"
          placeholder="Select week range"
          styleClass="week-range-picker"
          aria-label="Select evaluation week range">
        </p-datePicker>
      }

    </div>
  </div>

  <!-- ===== TAB CONTENT ===== -->
  @if (activeTab === 'weekly') {
    <app-weekly-evaluation></app-weekly-evaluation>
  }

  @if (activeTab === 'cumulative') {
    <app-cumulative-preference></app-cumulative-preference>
  }

  @if (activeTab === 'athlete') {
    <app-athlete-voice></app-athlete-voice>
  }

</div>
